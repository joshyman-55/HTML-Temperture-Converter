<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Temperature Converter</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="temp_style.css">
</head>
<body>
    <div id="appContainer" class="vbox">
        <label id="prompt">Enter Temperature:</label>
        <input type="text" id="inputField" autocomplete="off">
        
        <select id="unitBox">
            <option value="Fahrenheit">Fahrenheit</option>
            <option value="Celsius">Celsius</option>
            <option value="Kelvin">Kelvin</option>
            <option value="Rankine">Rankine</option>
        </select>

        <button id="convertBtn">Convert</button>

        <div id="resultLabel">Results will appear here</div>
    </div>
    <script src="temp_script.js"></script>
</body>
</html>
